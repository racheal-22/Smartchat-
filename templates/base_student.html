<!DOCTYPE html>
<html lang="en">
<head>

<title>SmartChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f0f5ff;
  --bg2:      #f7faff;
  --white:    #ffffff;
  --border:   rgba(99, 130, 220, 0.13);
  --border2:  rgba(99, 130, 220, 0.22);
  --accent:   #3b6ef8;
  --accent-h: #5b8cff;
  --ink:      #0f1c3f;
  --text:     #3a4a6b;
  --muted:    #8494b8;
  --danger:   #ef4444;
  --danger-bg:#fff1f1;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3 { font-weight: 600; color: var(--ink); margin: 0 0 14px; }
p { margin: 0 0 10px; color: var(--text); line-height: 1.65; }

/* ── LAYOUT ── */
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 228px;
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 22px 22px 18px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.2px;
}
.sidebar-logo span { color: var(--accent); }

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}

.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  text-decoration: none;
  color: var(--muted);
  font-size: 13.5px;
  font-weight: 400;
  transition: background 0.15s, color 0.15s;
}

.sidebar-nav a .nav-icon {
  font-size: 15px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-nav a:hover {
  background: #eef3ff;
  color: var(--ink);
}

.sidebar-nav a.active {
  background: rgba(59, 110, 248, 0.08);
  color: var(--accent);
  font-weight: 500;
}

.sidebar-footer {
  padding: 14px 12px;
  border-top: 1px solid var(--border);
}

.logout-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 10px 14px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  color: var(--danger);
  background: var(--danger-bg);
  border: 1px solid rgba(239, 68, 68, 0.15);
  transition: background 0.15s, color 0.15s;
}
.logout-btn:hover {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  padding: 36px 40px;
  overflow-y: auto;
  min-height: 0;
  background: var(--bg);
}

/* ── RIGHT PANEL ── */
.right-panel {
  width: 300px;
  background: var(--white);
  border-left: 1px solid var(--border);
  padding: 28px 22px;
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
}

/* ── CARDS ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 22px;
  box-shadow: 0 2px 12px rgba(59, 110, 248, 0.05);
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 14px;
}

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

/* ── BUTTONS ── */
.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 10px rgba(59, 110, 248, 0.2);
}
.btn:hover {
  background: var(--accent-h);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(59, 110, 248, 0.28);
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border2);
  box-shadow: none;
}
.btn-ghost:hover {
  color: var(--ink);
  border-color: rgba(59,110,248,0.35);
  background: rgba(59,110,248,0.04);
  box-shadow: none;
  transform: none;
}

/* ── INPUTS ── */
input, textarea, select {
  width: 100%;
  padding: 10px 13px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  margin-bottom: 10px;
  background: var(--bg2);
  color: var(--ink);
  transition: border-color 0.15s, background 0.15s;
}
input:focus, textarea:focus, select:focus {
  border-color: rgba(59,110,248,0.5);
  background: white;
}
input::placeholder, textarea::placeholder { color: var(--muted); }

/* ── XP HIGHLIGHT BOX ── */
.xp-box {
  background: linear-gradient(135deg, var(--accent) 0%, #6fa0ff 100%);
  color: white;
  padding: 26px;
  border-radius: 14px;
  margin-bottom: 22px;
  box-shadow: 0 4px 20px rgba(59, 110, 248, 0.22);
}
.xp-value {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.xp-label {
  font-size: 13px;
  opacity: 0.82;
  margin-top: 2px;
}

/* ── STAT BADGE ── */
.stat-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(59,110,248,0.07);
  border: 1px solid rgba(59,110,248,0.14);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}

/* ── PAGE TITLE ── */
.page-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.page-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d0dcf7; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #b8caff; }

</style>

</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-header">
      <a href="{% url 'student_dashboard' %}" class="sidebar-logo">Smart<span>Chat</span></a>
    </div>

    <nav class="sidebar-nav">
      <a href="{% url 'student_dashboard' %}">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="{% url 'chat_home' %}">
        <span class="nav-icon">🤖</span> Chatbot
      </a>
      
      <a href="{% url 'analytics' %}">
        <span class="nav-icon">📈</span> Analytics
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="{% url 'logout' %}" class="logout-btn">
        ↩ Logout
      </a>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    {% block content %}
    {% endblock %}
  </div>

  <!-- RIGHT PANEL -->
  {% block right_panel %}
  {% endblock %}

</div>

</body>
</html>
