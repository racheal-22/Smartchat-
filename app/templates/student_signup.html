<!DOCTYPE html>
<html>
<head>
    <title>Student Sign Up</title>
    <style>
        body {
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            font-family:Segoe UI;
            background:linear-gradient(135deg,#eef2ff,#ffffff);
        }

        .box {
            background:white;
            border:1px solid #e6ecff;
            padding:40px;
            border-radius:16px;
            width:380px;
            box-shadow:0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            text-align:center;
            color:#1f6feb;
            margin-bottom:25px;
        }

        input {
            width:100%;
            padding:12px;
            margin-bottom:14px;
            border:1px solid #c7dbff;
            border-radius:8px;
            font-size:14px;
        }

        button {
            width:100%;
            padding:12px;
            background:#1f6feb;
            color:white;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
        }

        button:hover {
            background:#1558c0;
        }

        .link {
            text-align:center;
            margin-top:15px;
        }

        .link a {
            color:#1f6feb;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Student Registration</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text"
            name="school_name"
            class="form-control"
            placeholder="School Name"
            required>
        <input type="text" name="full_name" placeholder="Full Name" required>
        <input type="number" name="standard" placeholder="Standard (1-12)" required>
        <input type="text" name="division" placeholder="Division (A/B/C)" required>
        <input type="text" name="roll_number" placeholder="Roll Number" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        


        <button type="submit">Create Student Account</button>
    </form>

    <div class="link">
        Already registered? <a href="{% url 'login' %}">Login</a>
    </div>
</div>

</body>
</html>
