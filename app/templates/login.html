<!DOCTYPE html>
<html>
<head>
    <title>Login | SmartChat</title>
    <style>
        body {
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI;
            background:linear-gradient(135deg,#eef2ff,#ffffff);
        }

        .box {
            width:380px;
            background:white;
            padding:40px;
            border-radius:18px;
            box-shadow:0 20px 40px rgba(0,0,0,0.08);
        }

        h2 {
            text-align:center;
            margin-bottom:25px;
            color:#4338ca;
        }

        input {
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #c7dbff;
            border-radius:8px;
            font-size:14px;
        }

        button {
            width:100%;
            padding:12px;
            background:#4338ca;
            color:white;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s ease;
        }

        button:hover {
            background:#3730a3;
        }

        .error {
            background:#fee2e2;
            color:#b91c1c;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
            font-size:13px;
        }

        .link {
            margin-top:15px;
            text-align:center;
            font-size:14px;
        }

        .link a {
            color:#4338ca;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Login to SmartChat</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don’t have an account?
        <a href="{% url 'student_signup' %}">Register</a>
    </div>

</div>

</body>
</html>
